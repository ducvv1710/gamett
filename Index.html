<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Phân Loại Hành Vi</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        /* Khung chứa 2 cột */
        .board {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Định dạng các cột */
        .column {
            width: 300px;
            min-height: 400px;
            border: 4px dashed #ccc;
            border-radius: 15px;
            padding: 10px;
            background-color: white;
            transition: background-color 0.3s;
        }

            .column h2 {
                margin-top: 0;
                padding-bottom: 10px;
                border-bottom: 2px solid #eee;
            }

        .col-friendly {
            border-color: #4CAF50;
        }

            .col-friendly h2 {
                color: #4CAF50;
            }

        .col-unfriendly {
            border-color: #F44336;
        }

            .col-unfriendly h2 {
                color: #F44336;
            }

        .column.drag-over {
            background-color: #e8f5e9;
        }

        /* Khu vực chứa thẻ lúc đầu */
        .card-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 20px;
            border: 2px solid #2196F3;
            border-radius: 15px;
            background-color: #e3f2fd;
            min-height: 100px;
        }

        /* Định dạng thẻ hình */
        .card {
            width: 120px;
            height: 120px;
            flex-shrink: 0; /* Giữ thẻ luôn là hình vuông */
            background-color: #fff;
            border: 3px solid #ff9800;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            user-select: none;
            touch-action: none;
            overflow: hidden;
        }

            .card:active {
                cursor: grabbing;
            }

            /* SỬA LỖI ẢNH TẠI ĐÂY */
            .card img {
                width: 100%;
                height: 100%;
                object-fit: contain; /* Thu nhỏ để hiển thị trọn vẹn 100% nội dung ảnh */
                border-radius: 6px;
                pointer-events: none; /* Tránh lỗi kéo nhầm file ảnh thay vì kéo thẻ */
            }

        /* Biểu tượng thông báo Đúng (V) / Sai (X) */
        #feedback-icon {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 150px;
            font-weight: bold;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .show-correct {
            color: #4CAF50;
            transform: translate(-50%, -50%) scale(1) !important;
        }

        .show-wrong {
            color: #F44336;
            transform: translate(-50%, -50%) scale(1) !important;
        }
    </style>
</head>
<body>

    <h1>Bé Hãy Phân Loại Hành Động Nhé!</h1>

    <!-- Bảng phân loại -->
    <div class="board">
        <div class="column col-friendly" id="friendly-col" data-type="friendly">
            <h2>😇 Thân Thiện</h2>
        </div>

        <div class="column col-unfriendly" id="unfriendly-col" data-type="unfriendly">
            <h2>👿 Không Thân Thiện</h2>
        </div>
    </div>

    <h3>Kéo các thẻ dưới đây vào đúng cột:</h3>

    <!-- Các thẻ hình -->
    <div class="card-container" id="source-container">

        <div class="card" draggable="true" data-type="unfriendly" id="card1">
            <img src="1.jpg" draggable="false">
        </div>
        <div class="card" draggable="true" data-type="unfriendly" id="card2">
            <img src="2.jpg" draggable="false">
        </div>
        <div class="card" draggable="true" data-type="friendly" id="card3">
            <img src="3.jpg" draggable="false">
        </div>
        <div class="card" draggable="true" data-type="unfriendly" id="card4">
            <img src="4.jpg" draggable="false">
        </div>
        <div class="card" draggable="true" data-type="friendly" id="card5">
            <img src="5.jpg" draggable="false">
        </div>
        <div class="card" draggable="true" data-type="friendly" id="card6">
            <img src="6.jpg" draggable="false">
        </div>
        <div class="card" draggable="true" data-type="friendly" id="card7">
            <img src="7.jpg" draggable="false">
        </div>
        <div class="card" draggable="true" data-type="friendly" id="card8">
            <img src="8.jpg" draggable="false">
        </div>
        <div class="card" draggable="true" data-type="friendly" id="card9">
            <img src="9.jpg" draggable="false">
        </div>
        <div class="card" draggable="true" data-type="unfriendly" id="card10">
            <img src="10.jpg" draggable="false">
        </div>
        <div class="card" draggable="true" data-type="unfriendly" id="card11">
            <img src="11.jpg" draggable="false">
        </div>
        <div class="card" draggable="true" data-type="unfriendly" id="card12">
            <img src="12.jpg" draggable="false">
        </div>

    </div>

    <!-- Dấu V và X ẩn -->
    <div id="feedback-icon"></div>

    <script>
        const cards = document.querySelectorAll('.card');
        const columns = document.querySelectorAll('.column');
        const feedbackIcon = document.getElementById('feedback-icon');
        const sourceContainer = document.getElementById('source-container');

        // Xáo trộn thứ tự các thẻ ngẫu nhiên khi tải trang
        const cardsArray = Array.from(cards);
        cardsArray.sort(() => Math.random() - 0.5);
        cardsArray.forEach(card => sourceContainer.appendChild(card));

        let draggedCard = null;

        // Xử lý sự kiện kéo thả cho các thẻ
        cards.forEach(card => {
            card.addEventListener('dragstart', (e) => {
                draggedCard = card;
                setTimeout(() => card.style.display = 'none', 0);
            });

            card.addEventListener('dragend', (e) => {
                setTimeout(() => {
                    draggedCard.style.display = 'flex';
                    draggedCard = null;
                }, 0);
            });
        });

        // Xử lý vùng thả (các cột)
        columns.forEach(column => {
            column.addEventListener('dragover', (e) => {
                e.preventDefault();
                column.classList.add('drag-over');
            });

            column.addEventListener('dragleave', () => {
                column.classList.remove('drag-over');
            });

            column.addEventListener('drop', (e) => {
                e.preventDefault();
                column.classList.remove('drag-over');

                if (draggedCard) {
                    const cardType = draggedCard.getAttribute('data-type');
                    const columnType = column.getAttribute('data-type');

                    if (cardType === columnType) {
                        column.appendChild(draggedCard);
                        showFeedback('✔', 'show-correct');
                        playAudio(true);
                    } else {
                        showFeedback('✖', 'show-wrong');
                        playAudio(false);
                    }
                }
            });
        });

        // Hàm hiển thị dấu V và X
        function showFeedback(text, className) {
            feedbackIcon.innerText = text;
            feedbackIcon.className = className;
            setTimeout(() => {
                feedbackIcon.className = '';
            }, 1000);
        }

        // Hàm tạo âm thanh
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playAudio(isCorrect) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (isCorrect) {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.5);
            } else {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            }
        }
    </script>
</body>
</html>
